name: ci

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json
      - name: Frontend install
        run: npm ci
        working-directory: apps/web
      - name: Frontend tests
        run: npm run test
        working-directory: apps/web
      - name: Frontend build
        run: npm run build
        working-directory: apps/web
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Backend tests
        run: pytest tests/ -q --ignore=tests/test_build_integration.py --cov=stackwarden --cov-report=xml
