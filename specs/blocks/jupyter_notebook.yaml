kind: block
schema_version: 2
id: jupyter_notebook
display_name: "JupyterLab Notebook"
tags:
  - notebook
  - interactive
  - development
components:
  pip:
    - name: jupyterlab
      version: ">=4.2,<5.0"
    - name: ipywidgets
      version: ">=8.1,<9.0"
env:
  - JUPYTER_ENABLE_LAB=yes
ports:
  - 8888
provides:
  layer: serving
