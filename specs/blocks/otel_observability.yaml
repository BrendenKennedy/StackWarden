kind: block
schema_version: 2
id: otel_observability
display_name: "OpenTelemetry Observability"
tags:
  - observability
  - tracing
  - monitoring
components:
  pip:
    - name: opentelemetry-api
      version: ">=1.28,<2.0"
    - name: opentelemetry-sdk
      version: ">=1.28,<2.0"
env:
  - OTEL_TRACES_EXPORTER=otlp
  - OTEL_METRICS_EXPORTER=otlp
provides:
  layer: observability_operations
