arch: arm64
os: linux
os_family: ubuntu
os_version: "24.04"
os_family_id: ubuntu
os_version_id: ubuntu_24_04
container_runtime: nvidia
cuda:
  major: 13
  minor: 0
  variant: cuda13.0
gpu:
  vendor: nvidia
  family: blackwell
  vendor_id: nvidia
  family_id: blackwell
  model_id: nvidia_gb10
  compute_capability: "12.1"
constraints:
  disallow:
    serve: []
  require:
    env: [NVIDIA_VISIBLE_DEVICES]
base_candidates:
  - name: nvcr.io/nvidia/pytorch
    tags: ["25.03-py3"]
    score_bias: 180
  - name: nvcr.io/nvidia/tritonserver
    tags: ["25.03-py3"]
    score_bias: 140
defaults:
  python: "3.12"
  workdir: "/workspace"
requirements:
  optimize_for:
    - throughput
    - latency
    - reproducibility
derived_capabilities:
  - cuda
  - tensor_cores
  - fp8
  - unified_memory
tags:
  - curated
  - dgx
  - dgx-spark
labels:
  optimization_scope: curated_authoritative
