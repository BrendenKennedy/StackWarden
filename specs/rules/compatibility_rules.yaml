schema_version: 1
rules:
  - id: nvidia-runtime-required
    version: 1
    enabled: true
    strict_hard: true
    when:
      gpu_vendor: nvidia
    requires:
      container_runtime: nvidia
    outcome:
      code: RUNTIME_MISMATCH
      severity: error
      message: NVIDIA workloads require the nvidia container runtime.
      fix_hint: Set profile container_runtime to nvidia.

  - id: cuda-driver-minimum
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_vendor: nvidia
    requires:
      driver_min: 535.0
    outcome:
      code: DRIVER_TOO_OLD
      severity: warning
      message: Driver may be too old for selected CUDA/runtime requirements.
      fix_hint: Upgrade host driver or choose blocks with lower CUDA requirements.

  - id: ampere-cuda-window
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_family: ampere
    requires:
      cuda_min: 11.8
      cuda_max: 12.5
    outcome:
      code: CUDA_RANGE_UNSUPPORTED
      severity: warning
      message: Selected CUDA runtime may be outside the tested Ampere window.
      fix_hint: Prefer CUDA runtime between 11.8 and 12.5 for Ampere.

  - id: hopper-flashattn-optimization
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_family: hopper
      compute_capability_min: 9.0
    outcome:
      code: FLASH_ATTN_OPT_PATH
      severity: info
      message: Hopper-class GPU detected; optimized attention path can be enabled.

  - id: blackwell-sdpa-compile-optimization
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_family: blackwell
    outcome:
      code: BLACKWELL_OPT_PATH
      severity: info
      message: Blackwell GPU detected; prefer PyTorch SDPA and torch.compile optimization path.

  - id: nvidia-finetune-accelerator-guidance
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_vendor: nvidia
    outcome:
      code: NVIDIA_FINETUNE_ACCELERATOR_PATH
      severity: info
      message: NVIDIA profile detected; optional LLM fine-tune accelerator layers (for example Unsloth) can be selected explicitly for compatible training workflows.

  - id: cpu-finetune-accelerator-warning
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_vendor: cpu
    outcome:
      code: FINETUNE_ACCELERATOR_UNSUPPORTED
      severity: warning
      message: CPU profile detected; NVIDIA-gated fine-tune accelerator layers will be incompatible.
      fix_hint: Use generic fine-tune layers or switch to a compatible NVIDIA profile.

  - id: nvidia-serving-accelerator-guidance
    version: 1
    enabled: true
    strict_hard: false
    when:
      gpu_vendor: nvidia
    outcome:
      code: NVIDIA_SERVING_ACCELERATOR_PATH
      severity: info
      message: NVIDIA profile detected; serving accelerators (vLLM, SGLang, TensorRT-LLM) are available as explicit opt-in layers.
