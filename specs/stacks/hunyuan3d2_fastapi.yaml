kind: stack_recipe
schema_version: 2
id: hunyuan3d2_fastapi
display_name: "Hunyuan3D-2 + FastAPI"
task: diffusion
serve: python_api
api: fastapi
layers:
  - ubuntu_24_04_runtime
  - nccl_accelerator
  - pytorch_core_compute
  - fastapi
  - hunyuan3d2_runtime
  - sdpa_attention_optimization
  - torch_compile_optimization
  - cudnn
build_strategy: overlay

components:
  base_role: pytorch
  apt:
    - "git"
    - "curl"

env:
  - "PYTHONUNBUFFERED=1"

ports:
  - 8000

entrypoint:
  cmd:
    - "python"
    - "-m"
    - "uvicorn"
    - "app.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/diffusion_api/"
      dst: "/app"
