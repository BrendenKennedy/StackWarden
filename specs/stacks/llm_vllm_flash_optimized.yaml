kind: stack_recipe
schema_version: 2
id: llm_vllm_flash_optimized
display_name: "LLM + vLLM + Flash Attention (Optimized)"
task: llm
serve: python_api
api: fastapi
blocks:
  - fastapi
  - vllm_model_runtime
  - flash_attention

components:
  base_role: pytorch
  pip:
    - name: fastapi
      version: "==0.115.*"
    - name: uvicorn
      version: "[standard]==0.30.*"
  apt:
    - git
    - curl

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1

ports:
  - 8000

entrypoint:
  cmd:
    - python
    - "-m"
    - uvicorn
    - app.main:app
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/llm_api/"
      dst: "/app"
