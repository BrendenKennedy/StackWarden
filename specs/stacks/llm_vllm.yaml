kind: stack_recipe
schema_version: 2
id: llm_vllm
display_name: "LLM + vLLM + FastAPI"
task: llm
serve: python_api
api: fastapi
requirements:
  constraints:
    stackwarden_certification: dgx_certified
    stackwarden_certification_note: Curated for DGX-class NVIDIA deployments. Non-DGX usage is best-effort.
layers:
  - ubuntu_24_04_runtime
  - nccl_accelerator
  - pytorch_core_compute
  - vllm_model_runtime
  - sdpa_attention_optimization
  - torch_compile_optimization
  - fastapi
  - otel_observability
build_strategy: overlay

components:
  base_role: pytorch
  apt:
    - "git"
    - "curl"

env:
  - "PYTHONUNBUFFERED=1"

ports:
  - 8000

entrypoint:
  cmd:
    - "python"
    - "-m"
    - "uvicorn"
    - "app.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/llm_api/"
      dst: "/app"
