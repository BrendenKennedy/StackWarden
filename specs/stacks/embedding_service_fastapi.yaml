kind: stack_recipe
schema_version: 2
id: embedding_service_fastapi
display_name: "Embedding Service (Sentence Transformers + FastAPI)"
requirements:
  constraints:
    stackwarden_certification: dgx_compatible
    stackwarden_certification_note: Compatible with DGX-class NVIDIA deployments. Cross-hardware portability remains best-effort.
layers:
  - ubuntu_24_04_runtime
  - nccl_accelerator
  - pytorch_core_compute
  - fastapi
  - sentence_transformers_embedding
  - sdpa_attention_optimization
  - torch_compile_optimization
  - otel_observability

components:
  base_role: pytorch
  pip:
    - name: fastapi
      version: "==0.115.*"
    - name: uvicorn
      version: "[standard]==0.30.*"
  apt:
    - git
    - curl

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1
  - HF_HOME=/workspace/hf_cache

ports:
  - 8000

entrypoint:
  cmd:
    - python
    - "-m"
    - uvicorn
    - app.main:app
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/embedding_api/"
      dst: "/app"
