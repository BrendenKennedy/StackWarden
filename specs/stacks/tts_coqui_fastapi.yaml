kind: stack_recipe
schema_version: 2
id: tts_coqui_fastapi
display_name: "Text-to-Speech (Coqui XTTS) + FastAPI"
blocks:
  - fastapi
  - tts_coqui
  - cudnn

components:
  base_role: pytorch
  pip:
    - name: fastapi
      version: "==0.115.*"
    - name: uvicorn
      version: "[standard]==0.30.*"
  apt:
    - git
    - curl
    - ffmpeg

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1

ports:
  - 8000

entrypoint:
  cmd:
    - python
    - "-m"
    - uvicorn
    - app.main:app
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/tts_api/"
      dst: "/app"
