kind: stack_recipe
schema_version: 2
id: rl_training_gymnasium
display_name: "Reinforcement Learning Training (SB3 + Gymnasium)"
blocks:
  - pytorch_core_compute
  - stable_baselines_rl

components:
  base_role: pytorch
  pip:
    # >=2.14 avoids NGC protobuf conflict; overrides file backs this for stacks
    - name: tensorboard
      version: ">=2.14,<3.0"
    - name: matplotlib
      version: ">=3.9,<4.0"
    - name: wandb
      version: ">=0.18,<1.0"
  apt:
    - git

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1

entrypoint:
  cmd:
    - python
    - train.py

files:
  copy:
    - src: "docs/examples/workspaces/rl/"
      dst: "/workspace"
