kind: stack_recipe
schema_version: 2
id: llm_ollama_gradio
display_name: "LLM + Ollama + Gradio Chat UI"
blocks:
  - ollama_runtime
  - gradio_ui

components:
  base_role: pytorch
  pip:
    - name: ollama
      version: ">=0.4,<1.0"
    - name: gradio
      version: ">=5.0,<6.0"
  apt:
    - curl

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1
  - OLLAMA_HOST=0.0.0.0

ports:
  - 7860
  - 11434

entrypoint:
  cmd:
    - python
    - app.py

files:
  copy:
    - src: "services/ollama_chat/"
      dst: "/app"
