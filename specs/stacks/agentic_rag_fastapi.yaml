kind: stack_recipe
schema_version: 2
id: agentic_rag_fastapi
display_name: "Agentic RAG + FastAPI"
task: rag
serve: python_api
api: fastapi
requirements:
  constraints:
    stackwarden_certification: dgx_compatible
    stackwarden_certification_note: Compatible with DGX-class NVIDIA deployments. Cross-hardware portability remains best-effort.
layers:
  - ubuntu_24_04_runtime
  - nccl_accelerator
  - pytorch_core_compute
  - sentence_transformers_embedding
  - sdpa_attention_optimization
  - torch_compile_optimization
  - fastapi
  - agent_orchestration
  - celery_orchestration
  - otel_observability

components:
  base_role: pytorch
  apt:
    - git
    - curl

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1
  - CHROMA_PERSIST_DIR=/workspace/chroma_data

ports:
  - 8000

entrypoint:
  cmd:
    - python
    - "-m"
    - uvicorn
    - app.main:app
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/agentic_rag_api/"
      dst: "/app"
