schema_version: 2
kind: stack_recipe
id: diffusion_fastapi
display_name: "Diffusion (PyTorch) + FastAPI"
task: diffusion
serve: python_api
api: fastapi
layers:
  - ubuntu_24_04_runtime
  - pytorch_core_compute
  - fastapi
  - sdpa_attention_optimization
  - torch_compile_optimization
  - cudnn
build_strategy: overlay

components:
  base_role: pytorch
  pip:
    - name: "diffusers"
      version: ">=0.32,<0.35"
    - name: "transformers"
      version: ">=4.55,<4.60"
  apt:
    - "git"
    - "curl"

env:
  - "PYTHONUNBUFFERED=1"

ports:
  - 8000

entrypoint:
  cmd:
    - "python"
    - "-m"
    - "uvicorn"
    - "app.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/diffusion_api/"
      dst: "/app"
