kind: stack_recipe
schema_version: 2
id: llm_fastapi_blocks
display_name: "LLM + FastAPI (composed blocks)"
task: llm
serve: python_api
api: fastapi
blocks:
  - fastapi
  - triton

components:
  base_role: pytorch
  pip:
    - name: "vllm"
      version: ">=0.6,<0.8"
  apt:
    - "git"
    - "curl"

build_strategy: overlay
env:
  - "PYTHONUNBUFFERED=1"
entrypoint:
  cmd:
    - "python"
    - "-m"
    - "uvicorn"
    - "app.main:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"

files:
  copy:
    - src: "services/llm_api/"
      dst: "/app"
