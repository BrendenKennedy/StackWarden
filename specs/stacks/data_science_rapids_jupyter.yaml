kind: stack_recipe
schema_version: 2
id: data_science_rapids_jupyter
display_name: "GPU Data Science (RAPIDS + JupyterLab)"
blocks:
  - jupyter_notebook
  - rapids_data_science
  - pytorch_core_compute

components:
  base_role: pytorch
  pip:
    - name: pandas
      version: ">=2.2,<3.0"
    - name: scikit-learn
      version: ">=1.5,<2.0"
    - name: matplotlib
      version: ">=3.9,<4.0"
    - name: seaborn
      version: ">=0.13,<1.0"
  apt:
    - git
    - curl

build_strategy: overlay
env:
  - PYTHONUNBUFFERED=1
  - JUPYTER_ENABLE_LAB=yes

ports:
  - 8888

entrypoint:
  cmd:
    - jupyter
    - lab
    - "--ip=0.0.0.0"
    - "--port=8888"
    - "--no-browser"
    - "--allow-root"

files:
  copy:
    - src: "notebooks/"
      dst: "/workspace/notebooks"
